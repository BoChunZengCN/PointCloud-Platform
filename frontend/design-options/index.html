    <title>点云平台页面设计候选</title>
    <link rel="stylesheet" href="design-options.css" />
  </head>
  <body class="option-index">
    <main class="decision-shell" aria-label="点云平台页面设计候选">
      <nav class="option-nav" aria-label="设计版本导航">
        <a href="design-a-production-workbench.html">A 生产工作台型</a>
        <a href="design-b-project-dashboard.html">B 项目驾驶舱型</a>
        <a href="design-c-viewer-first.html">C 查看器优先型</a>
      </nav>

      <section class="decision-hero" aria-labelledby="decision-title">
        <p class="eyebrow">Design Decision</p>
        <h1 id="decision-title">三种页面风格候选</h1>
        <p>
          这组页面用于选择后续正式前端方向。A 更适合生产处理，B 更适合项目汇报，C 更适合成果展示与三维查看。
        </p>
      </section>

      <section class="option-grid" aria-label="设计版本列表">
        <a class="option-card" href="design-a-production-workbench.html">
          <span>Version A</span>
          <strong>生产工作台型</strong>
          <p>资产列表、数据来源、任务状态和报告入口集中在一个可执行工作台。</p>
        </a>
        <a class="option-card dashboard-card" href="design-b-project-dashboard.html">
          <span>Version B</span>
          <strong>项目驾驶舱型</strong>
          <p>突出项目健康度、资产规模、风险提醒和管理者视角的关键指标。</p>
        </a>
        <a class="option-card viewer-card" href="design-c-viewer-first.html">
          <span>Version C</span>
          <strong>查看器优先型</strong>
          <p>大面积点云查看区域优先，任务与图层控制作为沉浸式侧栏。</p>
        </a>
      </section>
