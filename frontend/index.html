<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>点云项目工作台 / 点云项目驾驶舱 / Point Cloud Dashboard</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <main class="project-dashboard-shell" data-view="project-dashboard" aria-label="点云项目工作台与点云项目驾驶舱">
      <nav class="top-nav" aria-label="主导航">
        <a aria-current="page" href="index.html">项目驾驶舱</a>
        <a href="viewer.html">展示页</a>
        <a href="design-options/index.html">设计候选</a>
      </nav>

      <section class="dashboard-hero" aria-labelledby="project-title">
        <div>
          <p class="eyebrow">Point Cloud Dashboard</p>
          <h1 id="project-title">点云项目驾驶舱</h1>
          <p id="project-summary" class="summary-line">加载项目状态...</p>
        </div>
        <div id="project-health" class="health-card" aria-label="项目健康度">
          <span>项目健康度</span>
          <strong>-</strong>
          <small>等待数据</small>
        </div>
      </section>

      <section id="data-source-status" class="data-source-status" aria-label="数据来源状态">
        <span>数据来源</span>
        <strong>检查中</strong>
        <small>正在读取 API 或 workspace 数据</small>
      </section>

      <section class="kpi-grid" aria-label="项目关键指标">
        <article>
          <span>资产</span>
          <strong id="metric-assets">-</strong>
          <small>当前 workspace</small>
        </article>
        <article>
          <span>点数</span>
          <strong id="metric-points">-</strong>
          <small>已登记点云</small>
        </article>
        <article>
          <span>流程</span>
          <strong id="metric-phases">-</strong>
          <small>生产阶段</small>
        </article>
        <article>
          <span>风险</span>
          <strong id="metric-risks">-</strong>
          <small>阻塞与计划项</small>
        </article>
      </section>

      <section class="dashboard-main" aria-label="项目驾驶舱主体">
        <section id="asset-selector" class="asset-selector" aria-label="资产选择"></section>

        <section class="project-insight-panel" aria-labelledby="insight-title">
          <div class="section-title-row">
            <div>
              <p class="eyebrow">Selected Asset</p>
              <h2 id="insight-title">资产概览</h2>
            </div>
            <span id="asset-format" class="status-chip">LAS/LAZ</span>
          </div>
          <div id="project-preview" class="point-cloud-preview" aria-label="点云项目预览"></div>
          <div id="asset-detail" class="asset-detail"></div>
        </section>

        <aside class="decision-panel" aria-label="下一步决策">
          <section class="info-card" aria-labelledby="decision-title">
            <p class="eyebrow">Next Actions</p>
            <h2 id="decision-title">下一步决策</h2>
            <div id="decision-list" class="decision-list"></div>
          </section>

          <section class="info-card" aria-labelledby="reports-title">
            <p class="eyebrow">Reports</p>
            <h2 id="reports-title">报告入口</h2>
            <div id="report-list" class="report-list"></div>
          </section>
        </aside>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
